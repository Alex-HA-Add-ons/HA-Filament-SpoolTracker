---
name: "HA Add-on Boilerplate"
description: "A boilerplate Home Assistant add-on with Node.js, React, and SQLite/PostgreSQL"
version: 0.1.0
slug: ha_addon_boilerplate
init: false
arch:
  - aarch64
  - amd64
  - armv7

# Home Assistant specific configuration
ingress: true
ingress_port: 5173
panel_icon: mdi:application-brackets
panel_title: Add-on Boilerplate
homeassistant_api: true
# ingress_entry is automatically generated by Home Assistant
# based on the addon slug and instance ID

ports:
  "5173/tcp": 5173
options:
  database_url: ""
  log_level: "info"
schema:
  database_url: "str?"
  log_level: "list(debug|info|warning|error)"
startup: application
webui: "http://[HOST]:[PORT:5173]"
watchdog: "http://[HOST]:[PORT:5173]/api/health"
