---
name: "HA Filament SpoolTracker"
description: "Track 3D printer filament spool usage with Bambu Lab integration for Home Assistant"
version: 0.1.1
slug: ha_filament_spooltracker
init: false
arch:
  - aarch64
  - amd64
  - armv7

# Home Assistant specific configuration
ingress: true
ingress_port: 5173
panel_icon: mdi:printer-3d-nozzle
panel_title: SpoolTracker
homeassistant_api: true

ports:
  "5173/tcp": 5173
options:
  database_url: ""
  log_level: "info"
schema:
  database_url: "str?"
  log_level: "list(debug|info|warning|error)"
startup: application
webui: "http://[HOST]:[PORT:5173]"
watchdog: "http://[HOST]:[PORT:5173]/api/health"
